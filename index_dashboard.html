<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEO Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<nav id="navigation">
  <div class="nav-brand">
    <div class="dot"></div>
    CEO Dashboard
  </div>
  <ul>
    <li class="nav-item active" data-section="overview">Overview</li>
    <li class="nav-item" data-section="forecast">Forecast</li>
    <li class="nav-item" data-section="alerts">Alerts</li>
    <li class="nav-item" data-section="reports">Reports</li>
  </ul>
  <div class="nav-time" id="nav-time"></div>
</nav>

<div id="layout">
  <aside id="sidebar">

    <div class="sidebar-icon active" data-section="overview" title="Overview">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg>
    </div>

    <div class="sidebar-icon" data-section="forecast" title="Forecast">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-icon" data-section="alerts" title="Alerts">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
    </div>

    <div class="sidebar-icon" data-section="reports" title="Reports">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    </div>

    <div class="sidebar-divider"></div>

    <!-- settings thi theme thase -->
    <div class="sidebar-icon" id="settings-btn" title="Theme" style="margin-top: auto;">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </div>

  </aside>

  <main id="main-content"></main>
</div>

<!-- theme panel -->
<div class="theme-panel" id="theme-panel">
  <div class="theme-panel-title">Theme</div>
  <div class="theme-btn active" id="btn-dark">
    <div class="theme-btn-icon dark-icon"></div>
    <span class="theme-btn-label">Dark</span>
  </div>
  <div class="theme-btn" id="btn-light">
    <div class="theme-btn-icon light-icon"></div>
    <span class="theme-btn-label">Light</span>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
